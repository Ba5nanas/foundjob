name: foundjob-prod

services:
  foundjob-nginx:
    image: nginx:alpine
    container_name: foundjob-nginx
    depends_on:
      - foundjob-landingpage
      - foundjob-backoffice
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/prod.nginx.conf:/etc/nginx/nginx.conf:ro
      - foundjob-file-storage:/data/files:ro
    networks:
      - foundjob

  foundjob-landingpage:
    build:
      context: .
      dockerfile: apps/landingpage/Dockerfile.prod
    container_name: foundjob-landingpage
    env_file:
      - .env.example
    volumes:
      - foundjob-sockets:/var/run/foundjob
    networks:
      - foundjob

  foundjob-backoffice:
    build:
      context: .
      dockerfile: apps/backoffice/Dockerfile.prod
    container_name: foundjob-backoffice
    env_file:
      - .env.example
    volumes:
      - foundjob-sockets:/var/run/foundjob
    networks:
      - foundjob

  foundjob-main-control:
    build:
      context: .
      dockerfile: services/main-control/Dockerfile.prod
    container_name: foundjob-main-control
    env_file:
      - .env.example
    volumes:
      - foundjob-sockets:/var/run/foundjob
    networks:
      - foundjob

  foundjob-auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile.prod
    container_name: foundjob-auth-service
    env_file:
      - .env.example
    volumes:
      - foundjob-sockets:/var/run/foundjob
    networks:
      - foundjob

  foundjob-user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile.prod
    container_name: foundjob-user-service
    env_file:
      - .env.example
    volumes:
      - foundjob-sockets:/var/run/foundjob
    networks:
      - foundjob

  foundjob-company-service:
    build:
      context: .
      dockerfile: services/company-service/Dockerfile.prod
    container_name: foundjob-company-service
    env_file:
      - .env.example
    volumes:
      - foundjob-sockets:/var/run/foundjob
    networks:
      - foundjob

  foundjob-job-service:
    build:
      context: .
      dockerfile: services/job-service/Dockerfile.prod
    container_name: foundjob-job-service
    env_file:
      - .env.example
    volumes:
      - foundjob-sockets:/var/run/foundjob
    networks:
      - foundjob

  foundjob-application-service:
    build:
      context: .
      dockerfile: services/application-service/Dockerfile.prod
    container_name: foundjob-application-service
    env_file:
      - .env.example
    volumes:
      - foundjob-sockets:/var/run/foundjob
    networks:
      - foundjob

  foundjob-resume-service:
    build:
      context: .
      dockerfile: services/resume-service/Dockerfile.prod
    container_name: foundjob-resume-service
    env_file:
      - .env.example
    volumes:
      - foundjob-sockets:/var/run/foundjob
    networks:
      - foundjob

  foundjob-appointment-service:
    build:
      context: .
      dockerfile: services/appointment-service/Dockerfile.prod
    container_name: foundjob-appointment-service
    env_file:
      - .env.example
    volumes:
      - foundjob-sockets:/var/run/foundjob
    networks:
      - foundjob

  foundjob-package-service:
    build:
      context: .
      dockerfile: services/package-service/Dockerfile.prod
    container_name: foundjob-package-service
    env_file:
      - .env.example
    volumes:
      - foundjob-sockets:/var/run/foundjob
    networks:
      - foundjob

  foundjob-backoffice-service:
    build:
      context: .
      dockerfile: services/backoffice-service/Dockerfile.prod
    container_name: foundjob-backoffice-service
    env_file:
      - .env.example
    volumes:
      - foundjob-sockets:/var/run/foundjob
    networks:
      - foundjob

  foundjob-file-service:
    build:
      context: .
      dockerfile: services/file-service/Dockerfile.prod
    container_name: foundjob-file-service
    env_file:
      - .env.example
    volumes:
      - foundjob-sockets:/var/run/foundjob
      - foundjob-file-storage:/data/files
    networks:
      - foundjob

  foundjob-postgres:
    image: postgres:latest
    container_name: foundjob-postgres
    environment:
      POSTGRES_USER: foundjob
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: foundjob
    volumes:
      - foundjob-postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - foundjob

  foundjob-mongodb:
    image: mongo:latest
    container_name: foundjob-mongodb
    volumes:
      - foundjob-mongodb-data:/data/db
      - ./infrastructure/mongodb/init:/docker-entrypoint-initdb.d:ro
    networks:
      - foundjob

  foundjob-redis:
    image: redis:alpine
    container_name: foundjob-redis
    volumes:
      - foundjob-redis-data:/data
    networks:
      - foundjob

  foundjob-kafka:
    image: bitnami/kafka:latest
    container_name: foundjob-kafka
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@foundjob-kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://foundjob-kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
    volumes:
      - foundjob-kafka-data:/bitnami/kafka
    networks:
      - foundjob

networks:
  foundjob:
    name: foundjob-prod

volumes:
  foundjob-sockets:
  foundjob-file-storage:
  foundjob-postgres-data:
  foundjob-mongodb-data:
  foundjob-redis-data:
  foundjob-kafka-data:
